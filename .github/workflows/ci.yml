name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Syntax check
        run: node --check server.mjs

      - name: Verify package.json is publish-clean
        run: npm pkg fix --dry-run && npm publish --dry-run
